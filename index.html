<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paresh Mathur</title>
    <meta
      name="description"
      content="Personal site for Paresh Mathur. Currently under construction."
    />
    <style>
      :root {
        --bg: #f3efe6;
        --paper: #fffaf0;
        --ink: #171412;
        --muted: #6a6057;
        --accent: #b8572c;
        --border: #d8cfc2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(184, 87, 44, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(70, 101, 92, 0.14), transparent 32%),
          linear-gradient(135deg, var(--bg), #ece4d6 55%, #e8dcc9);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(720px, 100%);
        padding: 48px 40px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: color-mix(in srgb, var(--paper) 88%, white);
        box-shadow: 0 24px 80px rgba(23, 20, 18, 0.1);
      }

      p.kicker {
        margin: 0 0 12px;
        color: var(--accent);
        font: 700 0.9rem/1.2 Arial, Helvetica, sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 7vw, 5rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 20px 0 0;
        max-width: 34rem;
        color: var(--muted);
        font-size: clamp(1.05rem, 2vw, 1.2rem);
        line-height: 1.65;
      }

      .bar {
        width: 84px;
        height: 3px;
        margin-top: 28px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), #e8b07a);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Personal Site</p>
      <h1>Under construction.</h1>
      <div class="bar" aria-hidden="true"></div>
      <p>
        pareshmathur.com is being set up. A proper site will land here shortly.
      </p>
    </main>
  </body>
</html>
